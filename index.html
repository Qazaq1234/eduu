<!doctype html>
<html lang="kk">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Edukz CRM Portal</title>
<style>
:root{--bg:#f4f7fb;--card:#fff;--text:#0f172a;--muted:#64748b;--line:#e2e8f0;--blue:#2563eb;--green:#16a34a;--orange:#ea580c;--red:#dc2626;--nav:#0f172a}
*{box-sizing:border-box} body{margin:0;font-family:Inter,Arial,sans-serif;background:var(--bg);color:var(--text)}
.header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:14px 20px;display:flex;justify-content:space-between;align-items:center}
.wrap{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 61px)}
.sidebar{background:var(--nav);color:#fff;padding:18px}
.brand{font-size:28px;font-weight:800;margin-bottom:18px}.center-pill{padding:10px 12px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.1);border-radius:14px;font-size:14px;margin-bottom:12px}
.menu button{display:block;width:100%;text-align:left;background:transparent;color:#cbd5e1;border:0;padding:11px 12px;border-radius:12px;font-size:15px;cursor:pointer;margin-bottom:6px}.menu button.active,.menu button:hover{background:rgba(255,255,255,.1);color:#fff}
.main{padding:20px}.grid{display:grid;gap:16px}.stats{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.card{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:18px;box-shadow:0 8px 24px rgba(15,23,42,.05)}
.kpi{font-size:30px;font-weight:800}.muted{color:var(--muted)}h2{margin:0 0 12px}.toolbar{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px}.btn{background:var(--blue);color:#fff;border:0;border-radius:12px;padding:11px 14px;font-weight:700;cursor:pointer}.btn.secondary{background:#fff;color:var(--text);border:1px solid var(--line)}.btn.green{background:var(--green)}.btn.orange{background:var(--orange)}.btn.red{background:var(--red)}
input,select,textarea{width:100%;padding:12px 14px;border:1px solid var(--line);border-radius:14px;font-size:15px;background:#fff} textarea{min-height:100px}
.form2{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:12px}.table{width:100%;border-collapse:collapse}.table th,.table td{padding:12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:top}.badge{display:inline-block;padding:6px 10px;border-radius:999px;font-size:12px;font-weight:700}.b-pending{background:#fff7ed;color:#c2410c}.b-open{background:#eff6ff;color:#1d4ed8}.b-paid{background:#ecfdf5;color:#166534}.b-closed{background:#f1f5f9;color:#475569}.b-lock{background:#fef2f2;color:#b91c1c}
.two{display:grid;grid-template-columns:1.1fr .9fr;gap:16px}.hidden{display:none}@media(max-width:960px){.wrap{grid-template-columns:1fr}.sidebar{display:none}.two{grid-template-columns:1fr}}
.note{padding:12px 14px;border-radius:14px;background:#eff6ff;color:#1e3a8a;border:1px solid #bfdbfe}
.small{font-size:13px}.module-lock{opacity:.6;pointer-events:none;filter:grayscale(0.1)}
</style>
</head>
<body>
<div class="header">
  <div><strong>Edukz CRM Portal</strong> <span class="muted">• орталық басқару</span></div>
  <div id="topSummary" class="muted small"></div>
</div>
<div class="wrap">
  <aside class="sidebar">
    <div class="brand">Edukz</div>
    <div class="center-pill" id="centerInfo"></div>
    <div class="menu" id="menu"></div>
  </aside>
  <main class="main">
    <section id="dashboard" class="page"></section>
    <section id="students" class="page hidden"></section>
    <section id="journal" class="page hidden"></section>
    <section id="staff" class="page hidden"></section>
    <section id="requests" class="page hidden"></section>
    <section id="courses" class="page hidden"></section>
    <section id="online_students" class="page hidden"></section>
    <section id="settings" class="page hidden"></section>
  </main>
</div>
<script>
const LS = {
  founder:'edukz_founder_state_v5',
  crm:'edukz_crm_state_v5',
  student:'edukz_student_state_v5'
};
function seed(){
  if(!localStorage.getItem(LS.founder)){
    const founder={
      centers:[
        {id:'c1',name:'Demo EduKZ',owner:'Altaiyr',phone:'+7 777 000 00 00',email:'demo@edukz.kz',tariff:'pro',status:'approved',paymentLink:'https://pay.kaspi.kz/pay/demo123',paymentLabel:'Kaspi төлем',modules:['students','journal','staff','requests','courses','online_students','settings']}
      ]
    };
    localStorage.setItem(LS.founder,JSON.stringify(founder));
  }
  if(!localStorage.getItem(LS.crm)){
    const crm={
      activeCenterId:'c1',
      students:[
        {id:'s1',centerId:'c1',fullName:'Айару Т.',phone:'+7 777 111 11 11',code:'EDU1001',pin:'1111',status:'Белсенді'},
        {id:'s2',centerId:'c1',fullName:'Нұрлан А.',phone:'+7 777 222 22 22',code:'EDU1002',pin:'2222',status:'Белсенді'}
      ],
      staff:[{id:'t1',centerId:'c1',name:'Teacher',role:'Мұғалім',phone:'+7 701 000 00 01'}],
      journal:[{id:'j1',centerId:'c1',student:'Айару Т.',date:'2026-03-25',status:'Қатысты'}],
      courses:[
        {id:'oc1',centerId:'c1',title:'Математика 7-сынып',price:44444,teacher:'Teacher',portalUrl:'https://eduonline-delta.vercel.app/'},
        {id:'oc2',centerId:'c1',title:'Ағылшын Beginner',price:30000,teacher:'Teacher',portalUrl:'https://eduonline-delta.vercel.app/'}
      ],
      requests:[
        {id:'r1',centerId:'c1',studentId:'s1',student:'Айару Т.',courseId:'oc1',course:'Математика 7-сынып',price:44444,paymentStatus:'pending',accessStatus:'closed',proofSent:false,createdAt:new Date().toISOString()}
      ],
      enrollments:[]
    };
    localStorage.setItem(LS.crm,JSON.stringify(crm));
  }
  if(!localStorage.getItem(LS.student)){
    const student={activeCenterId:'c1', profile:{centerId:'c1',fullName:'Айару Т.',phone:'+7 777 111 11 11',email:'a@edu.kz',code:'EDU1001',pin:'1111'}};
    localStorage.setItem(LS.student,JSON.stringify(student));
  }
}
seed();
function getFounder(){return JSON.parse(localStorage.getItem(LS.founder)||'{}')}
function getCRM(){return JSON.parse(localStorage.getItem(LS.crm)||'{}')}
function saveCRM(v){localStorage.setItem(LS.crm,JSON.stringify(v))}
function activeCenter(){const f=getFounder(), c=getCRM();return f.centers.find(x=>x.id===c.activeCenterId)||f.centers[0]}
const tariffModules={
  starter:['students','journal','staff'],
  standard:['students','journal','staff','requests','settings'],
  pro:['students','journal','staff','requests','courses','online_students','settings'],
  online_only:['courses','online_students','requests','settings']
};
const labels={dashboard:'Басқару тақтасы',students:'Оқушылар',journal:'Журнал',staff:'Қызметкерлер',requests:'Өтінімдер / Төлем',courses:'Онлайн курс',online_students:'Онлайн оқушылар',settings:'Баптаулар'};
function fmt(n){return new Intl.NumberFormat('kk-KZ').format(n)+' ₸'}
function badge(type,text){return `<span class="badge ${type}">${text}</span>`}
function renderMenu(){
  const c=activeCenter();
  const allowed=tariffModules[c.tariff]||[];
  const menu=document.getElementById('menu');
  document.getElementById('centerInfo').innerHTML=`<div><strong>${c.name}</strong></div><div class="small">Тариф: ${c.tariff}</div>`;
  const items=['dashboard','students','journal','staff','requests','courses','online_students','settings'];
  menu.innerHTML=items.map(id=>{
    const locked=id!=='dashboard' && !allowed.includes(id);
    return `<button class="${id==='dashboard'?'active':''} ${locked?'module-lock':''}" data-page="${id}">${labels[id]} ${locked?'🔒':''}</button>`;
  }).join('');
  menu.querySelectorAll('button').forEach(b=>b.onclick=()=>{if(b.classList.contains('module-lock')) return; menu.querySelectorAll('button').forEach(x=>x.classList.remove('active')); b.classList.add('active'); showPage(b.dataset.page)})
}
function showPage(id){document.querySelectorAll('.page').forEach(p=>p.classList.add('hidden')); document.getElementById(id).classList.remove('hidden')}
function renderDashboard(){
  const crm=getCRM(), c=activeCenter();
  const reqs=crm.requests.filter(x=>x.centerId===c.id), paid=reqs.filter(x=>x.paymentStatus==='paid').length, open=reqs.filter(x=>x.accessStatus==='active').length;
  document.getElementById('topSummary').textContent=`${c.name} • тариф: ${c.tariff}`;
  document.getElementById('dashboard').innerHTML=`
    <div class="grid stats">
      <div class="card"><div class="muted">Оқушылар</div><div class="kpi">${crm.students.filter(x=>x.centerId===c.id).length}</div></div>
      <div class="card"><div class="muted">Онлайн курстар</div><div class="kpi">${crm.courses.filter(x=>x.centerId===c.id).length}</div></div>
      <div class="card"><div class="muted">Төлем расталды</div><div class="kpi">${paid}</div></div>
      <div class="card"><div class="muted">Ашық доступ</div><div class="kpi">${open}</div></div>
    </div>
    <div class="two" style="margin-top:16px">
      <div class="card">
        <h2>Негізгі логика</h2>
        <div class="note">Оқушы Student Portal-да <strong>Сатып алу</strong> басады → орталықтың <strong>Kaspi/банк ссылкасына</strong> өтеді → <strong>Төледім</strong> жібереді → CRM-да тексеріледі → админ/мұғалім <strong>доступ ашады</strong>.</div>
      </div>
      <div class="card">
        <h2>Орталық төлем ссылкасы</h2>
        <div><strong>${c.paymentLabel||'Kaspi'}</strong></div>
        <div class="muted small" style="word-break:break-all;margin:8px 0 12px">${c.paymentLink||'Ссылка қойылмаған'}</div>
        <button class="btn secondary" onclick="showPage('settings');document.querySelector('[data-page=settings]')?.click()">Ссылканы өзгерту</button>
      </div>
    </div>`;
}
function renderStudents(){
  const crm=getCRM(), c=activeCenter();
  document.getElementById('students').innerHTML=`<div class="card"><h2>Оқушылар</h2><table class="table"><tr><th>Аты-жөні</th><th>Телефон</th><th>Код</th><th>PIN</th><th>Статус</th></tr>${crm.students.filter(x=>x.centerId===c.id).map(s=>`<tr><td>${s.fullName}</td><td>${s.phone}</td><td>${s.code}</td><td>${s.pin}</td><td>${badge('b-open',s.status)}</td></tr>`).join('')}</table></div>`;
}
function renderJournal(){
 const crm=getCRM(),c=activeCenter();
 document.getElementById('journal').innerHTML=`<div class="card"><h2>Журнал</h2><table class="table"><tr><th>Оқушы</th><th>Күні</th><th>Белгі</th></tr>${crm.journal.filter(x=>x.centerId===c.id).map(j=>`<tr><td>${j.student}</td><td>${j.date}</td><td>${j.status}</td></tr>`).join('')}</table></div>`;
}
function renderStaff(){
 const crm=getCRM(),c=activeCenter();
 document.getElementById('staff').innerHTML=`<div class="card"><h2>Қызметкерлер</h2><table class="table"><tr><th>Аты</th><th>Рөлі</th><th>Телефон</th></tr>${crm.staff.filter(x=>x.centerId===c.id).map(s=>`<tr><td>${s.name}</td><td>${s.role}</td><td>${s.phone}</td></tr>`).join('')}</table></div>`;
}
function renderRequests(){
 const crm=getCRM(),c=activeCenter();
 document.getElementById('requests').innerHTML=`<div class="card"><h2>Өтінімдер / Төлем / Доступ</h2><table class="table"><tr><th>Оқушы</th><th>Курс</th><th>Баға</th><th>Төлем</th><th>Доступ</th><th>Әрекет</th></tr>${crm.requests.filter(x=>x.centerId===c.id).map(r=>`<tr>
 <td>${r.student}</td><td>${r.course}</td><td>${fmt(r.price)}</td>
 <td>${r.paymentStatus==='paid'?badge('b-paid','Төленді'):r.proofSent?badge('b-pending','Тексерілуде'):badge('b-closed','Күтуде')}</td>
 <td>${r.accessStatus==='active'?badge('b-open','Ашық'):badge('b-lock','Жабық')}</td>
 <td>
   <div class="toolbar">
     <button class="btn green" onclick="markPaid('${r.id}')">Төлемді растау</button>
     <button class="btn orange" onclick="openAccess('${r.id}')">Доступ ашу</button>
   </div>
 </td></tr>`).join('')}</table></div>`;
}
function markPaid(id){const crm=getCRM(); const r=crm.requests.find(x=>x.id===id); if(!r) return; r.paymentStatus='paid'; saveCRM(crm); renderAll(); alert('Төлем расталды');}
function openAccess(id){const crm=getCRM(); const r=crm.requests.find(x=>x.id===id); if(!r) return; if(r.paymentStatus!=='paid'){alert('Алдымен төлемді растау керек'); return;} r.accessStatus='active'; if(!crm.enrollments.some(e=>e.studentId===r.studentId&&e.courseId===r.courseId)){crm.enrollments.push({id:'en'+Date.now(),centerId:r.centerId,studentId:r.studentId,courseId:r.courseId,access:'active'})} saveCRM(crm); renderAll(); alert('Доступ ашылды');}
function renderCourses(){
 const crm=getCRM(),c=activeCenter();
 document.getElementById('courses').innerHTML=`<div class="card"><h2>Онлайн курс</h2><div class="note small" style="margin-bottom:12px">Бұл тарифте онлайн курс ашық болса, төмендегі portal ссылкасын оқушыларға бере аласың: <strong>https://eduonline-delta.vercel.app/</strong></div><table class="table"><tr><th>Курс</th><th>Мұғалім</th><th>Баға</th><th>Portal</th></tr>${crm.courses.filter(x=>x.centerId===c.id).map(k=>`<tr><td>${k.title}</td><td>${k.teacher}</td><td>${fmt(k.price)}</td><td><a href="${k.portalUrl}" target="_blank">Сілтеме ашу</a></td></tr>`).join('')}</table></div>`;
}
function renderOnlineStudents(){
 const crm=getCRM(), c=activeCenter();
 const list=crm.requests.filter(x=>x.centerId===c.id).map(r=>({name:r.student,course:r.course,payment:r.paymentStatus,access:r.accessStatus}));
 document.getElementById('online_students').innerHTML=`<div class="card"><h2>Онлайн оқушылар</h2><table class="table"><tr><th>Оқушы</th><th>Курс</th><th>Төлем</th><th>Доступ</th></tr>${list.map(x=>`<tr><td>${x.name}</td><td>${x.course}</td><td>${x.payment}</td><td>${x.access}</td></tr>`).join('')}</table></div>`;
}
function renderSettings(){
 const founder=getFounder(), c=activeCenter();
 document.getElementById('settings').innerHTML=`<div class="card"><h2>Орталық баптауы</h2><div class="form2"><div><label>Орталық атауы</label><input id="set_name" value="${c.name}"></div><div><label>Төлем атауы</label><input id="set_label" value="${c.paymentLabel||''}" placeholder="Kaspi / Halyk / Freedom"></div><div style="grid-column:1/-1"><label>Төлем ссылкасы</label><input id="set_link" value="${c.paymentLink||''}" placeholder="https://pay.kaspi.kz/pay/..."></div></div><div class="toolbar" style="margin-top:12px"><button class="btn" onclick="saveSettings()">Сақтау</button></div><div class="note small">Тариф founder порталдан ашылады. Сенің тарифің: <strong>${c.tariff}</strong></div></div>`;
}
function saveSettings(){const f=getFounder(); const c=f.centers.find(x=>x.id===getCRM().activeCenterId); c.name=document.getElementById('set_name').value.trim(); c.paymentLabel=document.getElementById('set_label').value.trim(); c.paymentLink=document.getElementById('set_link').value.trim(); localStorage.setItem(LS.founder,JSON.stringify(f)); renderAll(); alert('Сақталды');}
function renderAll(){renderMenu();renderDashboard();renderStudents();renderJournal();renderStaff();renderRequests();renderCourses();renderOnlineStudents();renderSettings();}
window.addEventListener('storage',renderAll); renderAll();
</script>
</body></html>
