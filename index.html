<!DOCTYPE html>
<html lang="kk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bilim Portal</title>
  <meta name="theme-color" content="#0f62fe" />
  <link rel="icon" href="data:," />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root{
      --bg:#f5f7fb; --card:#ffffff; --text:#111827; --muted:#6b7280; --line:#e5e7eb;
      --brand:#0f62fe; --brand-2:#eef4ff; --ok:#15803d; --bad:#dc2626; --warn:#b45309;
      --shadow:0 10px 32px rgba(0,0,0,.06);
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .container{max-width:1260px;margin:0 auto;padding:16px}
    .card{background:var(--card);border-radius:20px;padding:16px;box-shadow:var(--shadow);margin-bottom:12px}
    .grid{display:grid;gap:12px}
    .g2{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
    .g3{grid-template-columns:repeat(auto-fit,minmax(240px,1fr))}
    .g4{grid-template-columns:repeat(auto-fit,minmax(190px,1fr))}
    .row{display:flex;gap:8px;flex-wrap:wrap}
    .between{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .nav{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    button{border:none;background:var(--brand);color:#fff;padding:11px 15px;border-radius:12px;cursor:pointer;font:inherit}
    button.secondary{background:#fff;color:#111;border:1px solid var(--line)}
    button.soft{background:var(--brand-2);color:#111}
    button.active{background:#111;color:#fff}
    button:disabled{opacity:.6;cursor:not-allowed}
    input,select,textarea{width:100%;padding:11px 12px;border-radius:12px;border:1px solid var(--line);font:inherit;background:#fff}
    textarea{min-height:90px;resize:vertical}
    .muted{color:var(--muted)}
    .small{font-size:12px}
    .badge{display:inline-block;padding:6px 10px;border-radius:999px;background:var(--brand-2);font-size:12px}
    .kpi{font-size:30px;font-weight:800}
    .list-row{display:flex;justify-content:space-between;gap:12px;padding:12px 0;border-bottom:1px solid var(--line)}
    .notice{padding:12px 14px;border-radius:12px;margin-bottom:12px}
    .ok{background:#dcfce7;color:#166534}
    .err{background:#fee2e2;color:#991b1b}
    .warn{background:#fef3c7;color:#92400e}
    .hidden{display:none}
    .skeleton{height:18px;border-radius:8px;background:#ececec;margin:8px 0;animation:pulse 1.2s infinite}
    .topbar{position:sticky;top:0;z-index:5}
    .code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;background:#f3f4f6;padding:2px 6px;border-radius:8px}
    .tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
    .empty{padding:18px 0;color:var(--muted)}
    @keyframes pulse{0%,100%{opacity:.55}50%{opacity:1}}
    @media (max-width:640px){
      .container{padding:10px}
      .card{padding:14px}
      .kpi{font-size:24px}
    }
  </style>
</head>
<body>
  <div id="app" class="container"></div>

  <script>
    const SUPABASE_URL = 'https://sexswcmpqgtvsdvbqmkh.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNleHN3Y21wcWd0dnNkdmJxbWtoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA4MTAyNzIsImV4cCI6MjA4NjM4NjI3Mn0.Bm59DEF7jJ_YmKfJO493XNffWLJDoQD7_CzPHyRvTgY';
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const CACHE = 'bilim-portal-final-';

    const state = {
      user: null,
      profile: null,
      center: null,
      currentView: 'dashboard',
      monthlyFeeDefault: 30000,
      students: [],
      payments: [],
      attendance: [],
      branches: [],
      cashbox: [],
      notifications: [],
      staff: [],
      parentStudent: null,
      parentAttendance: [],
      parentPayments: []
    };

    const $ = (id) => document.getElementById(id);
    const esc = (v) => String(v ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
    const money = (v) => new Intl.NumberFormat('ru-RU').
    format(Number(v || 0)) + ' ₸';
    const ym = (d) => String(d || new Date().toISOString().slice(0,7)).slice(0,7);
    const today = () => new Date().toISOString().slice(0,10);
    const cacheKey = (name) => CACHE + (state.user?.id || 'guest') + '-' + name;
    const saveCache = (name, data) => localStorage.setItem(cacheKey(name), JSON.stringify(data));
    const loadCache = (name, fallback=[]) => { try { return JSON.parse(localStorage.getItem(cacheKey(name)) || JSON.stringify(fallback)); } catch { return fallback; } };
    const roleLabel = () => state.profile?.role || 'director';
    const isTeacher = () => roleLabel() === 'teacher';
    const branchName = (id) => state.branches.find(b => b.id === id)?.name || '-';

    function notice(msg, type='ok'){
      const el = $('notice');
      if(!el) return;
      el.className = 'notice ' + (type === 'ok' ? 'ok' : type === 'warn' ? 'warn' : 'err');
      el.textContent = msg;
      el.classList.remove('hidden');
    }

    function clearNotice(){
      const el = $('notice');
      if(!el) return;
      el.className = 'notice hidden';
      el.textContent = '';
    }

    function setBusy(id, busy, textBusy='Сақталуда...'){
      const btn = $(id);
      if(!btn) return;
      if(!btn.dataset.text) btn.dataset.text = btn.textContent;
      btn.disabled = busy;
      btn.textContent = busy ? textBusy : btn.dataset.text;
    }

    async function addNotification(text, type='info'){
      if(!state.user) return;
      const { data, error } = await sb.from('notifications')
        .insert([{ text, type, center_id: state.profile.center_id }])
        .select('id,text,type,created_at')
        .single();
      if(!error && data){
        state.notifications.unshift(data);
        saveCache('notifications', state.notifications);
      }
    }

    function renderAuth(){
      app.innerHTML = `
        <div id="notice" class="notice hidden"></div>
        <div class="grid g2" style="max-width:1120px;margin:28px auto 0">
          <div class="card">
            <h2 style="margin-top:0">Кіру</h2>
            <input id="loginEmail" placeholder="Email">
            <input id="loginPassword" type="password" placeholder="Пароль">
            <button id="loginBtn" onclick="loginUser()">Кіру</button>
            <div class="small muted" style="margin-top:8px">Директор да, мұғалім де осы жерден кіреді.</div>
          </div>

          <div class="card">
            <h2 style="margin-top:0">Директор тіркелуі</h2>
            <input id="regCenter" placeholder="Орталық атауы">
            <input id="regBranch" placeholder="Бірінші филиал атауы">
            <input id="regCity" placeholder="Қала">
            <input id="regName" placeholder="Директор аты">
            <input id="regEmail" placeholder="Email">
            <input id="regPassword" type="password" placeholder="Пароль">
            <button id="registerBtn" onclick="registerDirector()">Тіркелу</button>
          </div>

          <div class="card">
            <h2 style="margin-top:0">Мұғалім тіркелуі</h2>
            <input id="teacherCenterCode" placeholder="Center code">
            <input id="teacherName" placeholder="Мұғалім аты">
            <input id="teacherEmail" placeholder="Email">
            <input id="teacherPassword" type="password" placeholder="Пароль">
            <button id="teacherRegisterBtn" onclick="registerTeacher()">Тіркелу</button>
            <div class="small muted" style="margin-top:8px">Center code-ты директор береді.</div>
          </div>

          <div class="card">
            <h2 style="margin-top:0">Ата-ана кіруі</h2>
            <input id="parentCodeAuth" placeholder="Student code">
            <input id="parentPinAuth" placeholder="PIN">
            <button id="parentLoginBtn" onclick="parentLogin()">Кіру</button>
          </div>
        </div>`;
    }

    async function registerDirector(){
      clearNotice(); setBusy('registerBtn', true, 'Тіркелуде...');
      const centerName = $('regCenter').value.trim();
      const branchNameInput = $('regBranch').value.trim() || 'Бас филиал';
      const city = $('regCity').value.trim();
      const full_name = $('regName').value.trim();
      const email = $('regEmail').value.trim();
      const password = $('regPassword').value;

      if(!centerName || !email || !password){
        setBusy('registerBtn', false);
        return notice('Орталық атауы, email, пароль толтыр', 'err');
      }

      const centerCode = 'C' + Math.random().toString(36).slice(2,8).toUpperCase();

      const auth = await sb.auth.signUp({ email, password });
      if(auth.error){
        setBusy('registerBtn', false);
        return notice(auth.error.message, 'err');
      }

      const userId = auth.data.user?.id || auth.data.session?.user?.id;
      if(!userId){
        setBusy('registerBtn', false);
        return notice('Тіркелді. Енді email-пен кіріңіз.');
      }

      const centerRes = await sb.from('centers')
        .insert([{ name: centerName, city, owner_user_id: userId, center_code: centerCode }])
        .select('id,name,city,center_code')
        .single();
      if(centerRes.error){
        setBusy('registerBtn', false);
        return notice(centerRes.error.message, 'err');
      }

      const profileRes = await sb.from('profiles')
        .upsert([{
          user_id: userId,
          center_id: centerRes.data.id,
          full_name,
          role: 'director',
          status: 'active'
        }], { onConflict: 'user_id' });
      if(profileRes.error){
        setBusy('registerBtn', false);
        return notice(profileRes.error.message, 'err');
      }

      const branchRes = await sb.from('branches').insert([{
        center_id: centerRes.data.id,
        name: branchNameInput,
        city
      }]);

      setBusy('registerBtn', false);
      if(branchRes.error) return notice(branchRes.error.message, 'err');

      notice('Тіркелді. Center code: ' + centerCode + '. Оны мұғалімдерге бересіз.');
    }

    async function registerTeacher(){
      clearNotice(); setBusy('teacherRegisterBtn', true, 'Тіркелуде...');
      const center_code = $('teacherCenterCode').value.trim().toUpperCase();
      const full_name = $('teacherName').value.trim();
      const email = $('teacherEmail').value.trim();
      const password = $('teacherPassword').value;

      if(!center_code  !full_name  !email || !password){
        setBusy('teacherRegisterBtn', false);
        return notice('Center code, аты, email, пароль енгіз', 'err');
      }

      const centerRes = await sb.from('centers').select('id').eq('center_code', center_code).maybeSingle();
      if(centerRes.error || !centerRes.data){
        setBusy('teacherRegisterBtn', false);
        return notice('Center code қате', 'err');
      }

      const auth = await sb.auth.signUp({ email, password });
      if(auth.error){
        setBusy('teacherRegisterBtn', false);
        return notice(auth.error.message, 'err');
      }

      const userId = auth.data.user?.id || auth.data.session?.user?.id;
      if(!userId){
        setBusy('teacherRegisterBtn', false);
        return notice('Тіркелді. Енді кіру арқылы кіріңіз.');
      }

      const profileRes = await sb.from('profiles').upsert([{
        user_id: userId,
        center_id: centerRes.data.id,
        full_name,
        role: 'teacher',
        status: 'active'
      }], { onConflict: 'user_id' });

      setBusy('teacherRegisterBtn', false);
      if(profileRes.error) return notice(profileRes.error.message, 'err');
      notice('Мұғалім тіркелді. Енді кіру арқылы кіре алады.');
    }

    async function loginUser(){
      clearNotice(); setBusy('loginBtn', true, 'Кірілуде...');
      const email = $('loginEmail').value.trim();
      const password = $('loginPassword').value;
      const { data, error } = await sb.auth.signInWithPassword({ email, password });
      setBusy('loginBtn', false);
      if(error) return notice(error.message, 'err');
      state.user = data.user;
      openShell();
      renderDashboardSkeleton();
      await bootUser();
      view('dashboard');
    }

    async function logout(){
      await sb.auth.signOut();
      state.user = null;
      state.profile = null;
      state.center = null;
      state.parentStudent = null;
      state.parentAttendance = [];
      state.parentPayments = [];
      renderAuth();
    }

    function openShell(){
      app.innerHTML = `
        <div id="notice" class="notice hidden"></div>
        <div class="card topbar between">
          <div>
            <div style="font-size:28px;font-weight:800">Bilim Portal</div>
            <div class="muted">Тез, тұрақты, көп орталыққа арналған версия</div>
          </div>
          <div class="row">
            <span class="badge" id="whoami">...</span>
            <span class="badge" id="rolePill">...</span>
            <button class="secondary" onclick="logout()">Шығу</button>
          </div>
        </div>
        <div class="nav" id="navBar"></div>
        <div id="content"></div>`;
      $('whoami').textContent = state.user?.email || 'user';
    }

    function renderNav(){
      const items = [
        ['dashboard','Dashboard'],
        ['students','Оқушылар'],
        ['payments','Төлем'],
        ['attendance','Журнал'],
        ['finance','Кіріс/Шығыс'],
        ['branches','Филиал'],
        ['staff','Қызметкерлер'],
        ['notifications','Хабарлама'],
        ['parent','Ата-ана'],
        ['whatsapp','WhatsApp'],
        ['kaspi','Kaspi'],
        ['reports','Есеп']
      ];
      const visible = isTeacher()
        ? items.filter(x => ['dashboard','students','attendance','notifications','whatsapp'].includes(x[0]))
        : items;
      $('navBar').innerHTML = visible.map(([k,label]) => `<button onclick="view('${k}')">${label}</button>`).join('');
      $('rolePill').textContent = roleLabel();
    }

    async function bootUser(){
      await loadProfile();
      preloadFromCache();
      renderNav();
      renderDashboard();
      await loadMainData();
    }

    async function loadProfile(){
      const { data, error } = await sb.from('profiles').select('*').eq('user_id', state.user.id).maybeSingle();
      if(error) return notice(error.message, 'err');
      state.profile = data || { role:'director' };
      const centerRes = await sb.from('centers').select('*').eq('id', state.profile.center_id).maybeSingle();
      state.center = centerRes.data || null;
    }

    function preloadFromCache(){
      state.students = loadCache('students', []);
      state.payments = loadCache('payments', []);
      state.attendance = loadCache('attendance', []);
      state.branches = loadCache('branches', []);
      state.cashbox = loadCache('cashbox', []);
      state.notifications = loadCache('notifications', []);
      state.staff = loadCache('staff', []);
    }

    async function loadMainData(){
      const centerId = state.profile.center_id;
      const [students, payments, attendance, branches, cashbox, notifications, staff] = await Promise.all([
        sb.from('students').select('id,name,student_code,pin_code,parent_phone,branch_id,monthly_fee,debt_amount,created_at').eq('center_id', centerId).limit(300),
        sb.from('payments').select('id,name,student_id,amount,note,created_at').eq('center_id', centerId).order('created_at',{ascending:false}).limit(300),
        sb.from('attendance').select('id,name,student_id,status,note,created_at').eq('center_id', centerId).order('created_at',{ascending:false}).limit(300),
        sb.from('branches').select('id,name,city,created_at').eq('center_id', centerId).limit(100),
        sb.from('cashbox').select('id,type,amount,category,note,created_at').eq('center_id', centerId).order('created_at',{ascending:false}).limit(300),
        sb.from('notifications').select('id,text,type,created_at').eq('center_id', centerId).order('created_at',{ascending:false}).limit(100),
        sb.from('profiles').select('user_id,full_name,role,status').eq('center_id', centerId).order('created_at',{ascending:false}).limit(100)
      ]);

      if(students.error) return notice(students.error.message, 'err');
      if(payments.error) return notice(payments.error.message, 'err');
      if(attendance.error) return notice(attendance.error.message, 'err');
      if(branches.error) return notice(branches.error.message, 'err');
      if(cashbox.error) return notice(cashbox.error.message, 'err');
      if(notifications.error) return notice(notifications.error.message, 'err');
      if(staff.error) return notice(staff.error.message, 'err');

      state.students = students.data || [];
      state.payments = payments.data || [];
      state.attendance = attendance.data || [];
      state.branches = branches.data || [];
      state.cashbox = cashbox.data || [];
      state.notifications = notifications.data || [];
      state.staff = staff.data || [];

      saveCache('students', state.students);
      saveCache('payments', state.payments);
      saveCache('attendance', state.attendance);
      saveCache('branches', state.branches);
      saveCache('cashbox', state.cashbox);
      saveCache('notifications', state.notifications);
      saveCache('staff', state.staff);

      view(state.currentView);
    }

    function setActiveNav(){
      document.querySelectorAll('.nav button').forEach(btn => btn.classList.remove('active'));
      const btn = Array.from(document.querySelectorAll('.nav button')).find(b => b.textContent.trim() === ({
        dashboard:'Dashboard', students:'Оқушылар', payments:'Төлем', attendance:'Журнал', finance:'Кіріс/Шығыс',
        branches:'Филиал', staff:'Қызметкерлер', notifications:'Хабарлама', parent:'Ата-ана',
        whatsapp:'WhatsApp', kaspi:'Kaspi', reports:'Есеп'
      })[state.currentView]);
      if(btn) btn.classList.add('active');
    }

    function view(v){
      state.currentView = v;
      setActiveNav();
      clearNotice();
      if(v === 'dashboard') return renderDashboard();
      if(v === 'students') return renderStudents();
      if(v === 'payments') return renderPayments();
      if(v === 'attendance') return renderAttendance();
      if(v === 'finance') return renderFinance();
      if(v === 'branches') return renderBranches();
      if(v === 'staff') return renderStaff();
      if(v === 'notifications') return renderNotifications();
      if(v === 'parent') return renderParentPanel();
      if(v === 'whatsapp') return renderWhatsApp();
      if(v === 'kaspi') return renderKaspi();
      if(v === 'reports') return renderReports();
    }

    function renderDashboardSkeleton(){
      $('content').innerHTML = <div class="grid g4">${Array(4).fill('<div class="card"><div class="skeleton"></div><div class="skeleton"></div></div>').join('')}</div>;
    }

    function renderDashboard(){
      const income = state.cashbox.filter(x => x.type === 'Кіріс').reduce((s,x)=>s+Number(x.amount||0),0);
      const expense = state.cashbox.filter(x => x.type === 'Шығыс').reduce((s,x)=>s+Number(x.amount||0),0);
      const debt = state.students.reduce((s,x)=>s+Number(x.debt_amount||0),0);
      $('content').innerHTML = `
        <div class="grid g4">
          <div class="card"><div class="muted">Оқушылар</div><div class="kpi">${state.students.length}</div></div>
          <div class="card"><div class="muted">Кіріс</div><div class="kpi">${money(income)}</div></div>
          <div class="card"><div class="muted">Шығыс</div><div class="kpi">${money(expense)}</div></div>
          <div class="card"><div class="muted">Жалпы қарыз</div><div class="kpi">${money(debt)}</div></div>
        </div>
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Орталық</h3>
            <div>${esc(state.center?.name || '-')}</div>
            <div class="small muted">Center code: <span class="code">${esc(state.center?.center_code || '-')}</span></div>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Соңғы хабарламалар</h3>
            ${state.notifications.slice(0,5).map(n=>`<div class="list-row"><div>${esc(n.text)}</div><div class="small muted">${n.created_at ? new Date(n.created_at).toLocaleDateString('kk-KZ') : ''}</div></div>`).join('') || '<div class="empty">Хабарлама жоқ</div>'}
          </div>
        </div>`;
    }

    function renderStudents(){
      $('content').innerHTML = `
      <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Оқушы қосу</h3>
            <input id="sname" placeholder="Аты">
            <input id="scode" placeholder="Student code">
            <input id="spin" placeholder="PIN">
            <input id="sphone" placeholder="Ата-ана WhatsApp нөмірі">
            <input id="sfee" type="number" value="${state.monthlyFeeDefault}" placeholder="Айлық төлем">
            <select id="sbranch"><option value="">Филиал</option>${state.branches.map(b=>`<option value="${b.id}">${esc(b.name)}</option>`).join('')}</select>
            <button id="addStudentBtn" onclick="addStudent()">Қосу</button>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Оқушылар</h3>
            ${state.students.length ? state.students.map(s=>`
              <div class="list-row">
                <div>
                  <strong>${esc(s.name)}</strong>
                  <div class="small muted">${esc(s.student_code  '')} / ${esc(s.pin_code  '')}</div>
                  <div class="small muted">Айлық: ${money(s.monthly_fee  0)} · Қарыз: ${money(s.debt_amount  0)}</div>
                </div>
                <div class="small muted">${esc(branchName(s.branch_id))}</div>
              </div>`).join('') : '<div class="empty">Оқушы жоқ</div>'}
          </div>
        </div>`;
    }

    async function addStudent(){
      setBusy('addStudentBtn', true);
      const payload = {
        center_id: state.profile.center_id,
        name: $('sname').value.trim(),
        student_code: $('scode').value.trim() || null,
        pin_code: $('spin').value.trim() || null,
        parent_phone: $('sphone').value.trim() || null,
        branch_id: $('sbranch').value || null,
        monthly_fee: Number($('sfee').value  state.monthlyFeeDefault  0),
        debt_amount: Number($('sfee').value  state.monthlyFeeDefault  0)
      };
      if(!payload.name){
        setBusy('addStudentBtn', false);
        return notice('Оқушы атын енгіз', 'err');
      }
      const { data, error } = await sb.from('students').insert([payload]).select('id,name,student_code,pin_code,parent_phone,branch_id,monthly_fee,debt_amount').single();
      setBusy('addStudentBtn', false);
      if(error) return notice(error.message, 'err');
      state.students.unshift(data);
      saveCache('students', state.students);
      await addNotification('Жаңа оқушы қосылды: ' + payload.name, 'student');
      renderStudents();
      notice('Оқушы сақталды');
    }

    function renderPayments(){
      $('content').innerHTML = `
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Төлем қосу</h3>
            <input id="pname" placeholder="Оқушы аты">
            <input id="pamount" type="number" placeholder="Сома">
            <input id="pnote" placeholder="Ескерту">
            <button id="addPaymentBtn" onclick="addPayment()">Қосу</button>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Төлемдер</h3>
            ${state.payments.length ? state.payments.map(p=>`
              <div class="list-row">
                <div><strong>${esc(p.name)}</strong><div class="small muted">${esc(p.note || '')}</div></div>
                <div>${money(p.amount)}</div>
              </div>`).join('') : '<div class="empty">Төлем жоқ</div>'}
          </div>
        </div>`;
    }

    async function addPayment(){
      setBusy('addPaymentBtn', true);
      const studentName = $('pname').value.trim();
      const amount = Number($('pamount').value || 0);
      const note = $('pnote').value.trim();
      if(!studentName || !amount){
        setBusy('addPaymentBtn', false);
        return notice('Оқушы және сома керек', 'err');
      }
      const student = state.students.find(s => s.name === studentName) || null;
      const payload = {
        center_id: state.profile.center_id,
        name: studentName,
        student_id: student?.id || null,
        amount,
        note
      };
      const { data, error } = await sb.from('payments').
        insert([payload]).select('id,name,student_id,amount,note,created_at').single();
      if(error){
        setBusy('addPaymentBtn', false);
        return notice(error.message, 'err');
      }
      state.payments.unshift(data);
      saveCache('payments', state.payments);

      if(student){
        const nextDebt = Math.max(Number(student.debt_amount || 0) - amount, 0);
        const upd = await sb.from('students').update({ debt_amount: nextDebt }).eq('id', student.id).select('id,name,student_code,pin_code,parent_phone,branch_id,monthly_fee,debt_amount').single();
        if(!upd.error && upd.data){
          const idx = state.students.findIndex(x => x.id === student.id);
          if(idx >= 0) state.students[idx] = upd.data;
          saveCache('students', state.students);
        }
      }

      await sb.from('cashbox').insert([{ center_id: state.profile.center_id, type:'Кіріс', amount, category:'Төлем', note: studentName + ' төлемі' }]);
      await addNotification(`Төлем түсті: ${studentName} – ${money(amount)}`, 'payment');
      setBusy('addPaymentBtn', false);
      await loadMainData();
      notice('Төлем сақталды');
    }

    function renderAttendance(){
      $('content').innerHTML = `
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Журнал белгілеу</h3>
            <input id="aname" placeholder="Оқушы аты">
            <select id="astatus"><option value="Келді">Келді</option><option value="Келмеді">Келмеді</option></select>
            <input id="anote" placeholder="Ескерту">
            <button id="addAttendanceBtn" onclick="addAttendance()">Сақтау</button>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Қатысу</h3>
            ${state.attendance.length ? state.attendance.map(a=>`
              <div class="list-row">
                <div><strong>${esc(a.name)}</strong><div class="small muted">${esc(a.status || '')}</div></div>
                <div class="small muted">${a.created_at ? new Date(a.created_at).toLocaleDateString('kk-KZ') : '-'}</div>
              </div>`).join('') : '<div class="empty">Журнал бос</div>'}
          </div>
        </div>`;
    }

    async function addAttendance(){
      setBusy('addAttendanceBtn', true);
      const studentName = $('aname').value.trim();
      const student = state.students.find(s => s.name === studentName) || null;
      const payload = {
        center_id: state.profile.center_id,
        name: studentName,
        student_id: student?.id || null,
        status: $('astatus').value,
        note: $('anote').value.trim()
      };
      if(!payload.name){
        setBusy('addAttendanceBtn', false);
        return notice('Оқушы атын енгіз', 'err');
      }
      const { data, error } = await sb.from('attendance').insert([payload]).select('id,name,student_id,status,note,created_at').single();
      setBusy('addAttendanceBtn', false);
      if(error) return notice(error.message, 'err');
      state.attendance.unshift(data);
      saveCache('attendance', state.attendance);
      if(payload.status === 'Келмеді') await addNotification('Келмеді: ' + studentName, 'attendance');
      renderAttendance();
      notice('Журнал сақталды');
    }

    function renderFinance(){
      const income = state.cashbox.filter(x => x.type === 'Кіріс').reduce((s,x)=>s+Number(x.amount||0),0);
      const expense = state.cashbox.filter(x => x.type === 'Шығыс').reduce((s,x)=>s+Number(x.amount||0),0);
      $('content').innerHTML = `
        <div class="grid g4">
          <div class="card"><div class="muted">Кіріс</div><div class="kpi">${money(income)}</div></div>
          <div class="card"><div class="muted">Шығыс</div><div class="kpi">${money(expense)}</div></div>
          <div class="card"><div class="muted">Қалдық</div><div class="kpi">${money(income - expense)}</div></div>
          <div class="card"><div class="muted">Жазба саны</div><div class="kpi">${state.cashbox.length}</div></div>
        </div>
        <div class="grid g2">
          <div class="card">
          <h3 style="margin-top:0">Кіріс / Шығыс қосу</h3>
            <select id="ctype"><option value="Кіріс">Кіріс</option><option value="Шығыс">Шығыс</option></select>
            <input id="camount" type="number" placeholder="Сома">
            <input id="ccategory" placeholder="Категория">
            <textarea id="cnote" placeholder="Ескерту"></textarea>
            <button id="addCashboxBtn" onclick="addCashbox()">Сақтау</button>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Қаржы ағыны</h3>
            ${state.cashbox.length ? state.cashbox.map(c=>`
              <div class="list-row">
                <div><strong>${esc(c.type)}</strong><div class="small muted">${esc(c.category  '-')} · ${esc(c.note  '')}</div></div>
                <div>${money(c.amount)}</div>
              </div>`).join('') : '<div class="empty">Жазба жоқ</div>'}
          </div>
        </div>`;
    }

    async function addCashbox(){
      setBusy('addCashboxBtn', true);
      const payload = {
        center_id: state.profile.center_id,
        type: $('ctype').value,
        amount: Number($('camount').value || 0),
        category: $('ccategory').value.trim(),
        note: $('cnote').value.trim()
      };
      if(!payload.amount){
        setBusy('addCashboxBtn', false);
        return notice('Сома енгіз', 'err');
      }
      const { data, error } = await sb.from('cashbox').insert([payload]).select('id,type,amount,category,note,created_at').single();
      setBusy('addCashboxBtn', false);
      if(error) return notice(error.message, 'err');
      state.cashbox.unshift(data);
      saveCache('cashbox', state.cashbox);
      renderFinance();
      notice('Қаржы жазбасы сақталды');
    }

    function renderBranches(){
      $('content').innerHTML = `
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Филиал қосу</h3>
            <input id="bname" placeholder="Филиал атауы">
            <input id="bcity" placeholder="Қала">
            <button id="addBranchBtn" onclick="addBranch()">Қосу</button>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Филиалдар</h3>
            ${state.branches.length ? state.branches.map(b=>`
              <div class="list-row">
                <div>${esc(b.name)}</div>
                <div class="small muted">${esc(b.city || '')}</div>
              </div>`).join('') : '<div class="empty">Филиал жоқ</div>'}
          </div>
        </div>`;
    }

    async function addBranch(){
      setBusy('addBranchBtn', true);
      const payload = { center_id: state.profile.center_id, name: $('bname').value.trim(), city: $('bcity').value.trim() };
      if(!payload.name){
        setBusy('addBranchBtn', false);
        return notice('Филиал атауын енгіз', 'err');
      }
      const { data, error } = await sb.from('branches').insert([payload]).select('id,name,city,created_at').single();
      setBusy('addBranchBtn', false);
      if(error) return notice(error.message, 'err');
      state.branches.unshift(data);
      saveCache('branches', state.branches);
      renderBranches();
      notice('Филиал сақталды');
    }

    function renderStaff(){
      $('content').innerHTML = `
        <div class="card">
          <h3 style="margin-top:0">Қызметкерлер</h3>
          ${state.staff.length ? state.staff.map(p=>`
            <div class="list-row">
              <div><strong>${esc(p.full_name  '-')}</strong><div class="small muted">${esc(p.role  '')}</div></div>
              <div class="small muted">${esc(p.status || '')}</div>
            </div>`).join('') : '<div class="empty">Қызметкер жоқ</div>'}
        </div>`;
    }

    function renderNotifications(){
      $('content').innerHTML = `
        <div class="card">
          <h3 style="margin-top:0">Хабарламалар</h3>
          ${state.notifications.length ? state.notifications.map(n=>`
            <div class="list-row">
              <div><strong>${esc(n.text)}</strong><div class="small muted">${esc(n.type || 'info')}</div></div>
              <div class="small muted">${n.created_at ? new Date(n.created_at).toLocaleDateString('kk-KZ') : ''}</div>
            </div>`).join('') : '<div class="empty">Хабарлама жоқ</div>'}
        </div>`;
    }

    function renderParentPanel(){
      $('content').innerHTML = `
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Ата-ана кіруі</h3>
            <input id="parentCode" placeholder="Student code">
            <input id="parentPin" placeholder="PIN">
            <button id="parentPanelLoginBtn" onclick="parentLogin()">Кіру</button>
          </div>
          <div class="card">${drawParentCabinet()}</div>
        </div>`;
    }

    function drawParentCabinet(){
      if(!state.parentStudent) return '<div class="empty">Code пен PIN енгізіңіз</div>';
      return `
        <h3 style="margin-top:0">${esc(state.parentStudent.name)}</h3>
        <div class="row">
          <span class="badge">Қарыз: ${money(state.parentStudent.debt_amount || 0)}</span>
          <span class="badge">Қатысу: ${state.parentAttendance.length}</span>
          <span class="badge">Төлем: ${state.parentPayments.length}</span>
        </div>
        <div style="margin-top:10px"><strong>Соңғы 5 қатысу</strong>${state.parentAttendance.length ? state.parentAttendance.slice(0,5).map(a=>`<div class="list-row"><div>${esc(a.status || '')}</div><div class="small muted">${a.created_at ? new Date(a.created_at).toLocaleDateString('kk-KZ') : '-'}</div></div>`).join('') : '<div class="empty">Жоқ</div>'}</div>
        <div style="margin-top:14px"><strong>Соңғы 5 төлем</strong>${state.parentPayments.length ? state.parentPayments.slice(0,5).map(p=>`<div class="list-row"><div>${money(p.amount)}</div><div class="small muted">${p.created_at ? new Date(p.created_at).toLocaleDateString('kk-KZ') : '-'}</div></div>`).join('') : '<div class="empty">Жоқ</div>'}</div>`;
    }

    async function parentLogin(){
      clearNotice();
      const code = ($('parentCodeAuth')  $('parentCode'))?.value?.trim()  '';
      const pin = ($('parentPinAuth')  $('parentPin'))?.value?.trim()  '';
      if(!code || !pin) return notice('Code және PIN енгіз', 'err');

      setBusy('parentLoginBtn', true, 'Кірілуде...');
      setBusy('parentPanelLoginBtn', true, 'Кірілуде...');

      const studentRes = await sb.rpc('parent_login_check', { p_code: code, p_pin: pin });
      if(studentRes.error){
        setBusy('parentLoginBtn', false);
        setBusy('parentPanelLoginBtn', false);
        return notice(studentRes.error.message, 'err');
      }
      if(!studentRes.data || !studentRes.data.length){
        setBusy('parentLoginBtn', false);
        setBusy('parentPanelLoginBtn', false);
        return notice('Code/PIN қате', 'err');
      }

      state.parentStudent = studentRes.data[0];
      const [attRes, payRes] = await Promise.all([
        sb.rpc('parent_attendance', { p_code: code, p_pin: pin }),
        sb.rpc('parent_payments', { p_code: code, p_pin: pin })
      ]);

      setBusy('parentLoginBtn', false);
      setBusy('parentPanelLoginBtn', false);

      if(attRes.error) return notice(attRes.error.message, 'err');
      if(payRes.error) return notice(payRes.error.message, 'err');

      state.parentAttendance = attRes.data || [];
      state.parentPayments = payRes.data || [];
      openParentShell();
    }

    function openParentShell(){
      app.innerHTML = `
        <div id="notice" class="notice hidden"></div>
        <div class="card between">
          <div>
            <div style="font-size:28px;font-weight:800">Bilim Portal</div>
            <div class="muted">Ата-ана кабинеті</div>
          </div>
          <button class="secondary" onclick="parentLogout()">Шығу</button>
        </div>
        <div id="content"></div>`;
      renderParentDashboard();
    }

    function parentLogout(){
      state.parentStudent = null;
      state.parentAttendance = [];
      state.parentPayments = [];
      renderAuth();
    }

    function renderParentDashboard(){
      const s = state.parentStudent;
      const attendance = state.parentAttendance || [];
      const payments = state.parentPayments || [];
      if(!s){
        $('content').innerHTML = '<div class="card"><div class="empty">Оқушы табылмады</div></div>';
        return;
      }
      const totalPaid = payments.reduce((sum,p)=>sum+Number(p.amount||0),0);
      const presentCount = attendance.filter(a => (a.status || '') === 'Келді').length;
      const absentCount = attendance.filter(a => (a.status || '') === 'Келмеді').length;

      $('content').innerHTML = `
        <div class="grid g4">
          <div class="card"><div class="muted">Оқушы</div><div class="kpi" style="font-size:22px">${esc(s.name)}</div></div>
          <div class="card"><div class="muted">Айлық төлем</div><div class="kpi">${money(s.monthly_fee || 0)}</div></div>
          <div class="card"><div class="muted">Қарыз</div><div class="kpi">${money(s.debt_amount || 0)}</div></div>
          <div class="card"><div class="muted">Жалпы төленген</div><div class="kpi">${money(totalPaid)}</div></div>
        </div>
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Қатысу</h3>
            <div class="row"><span class="badge">Келді: ${presentCount}</span><span class="badge">Келмеді: ${absentCount}</span></div>
            <div style="margin-top:10px">${attendance.length ? attendance.map(a=>`<div class="list-row"><div><strong>${esc(a.status  '')}</strong><div class="small muted">${esc(a.note  '')}</div></div><div class="small muted">${a.created_at ? new Date(a.created_at).toLocaleDateString('kk-KZ') : '-'}</div></div>`).join('') : '<div class="empty">Қатысу тарихы жоқ</div>'}</div>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Төлем тарихы</h3>
            <div style="margin-top:10px">${payments.length ? payments.map(p=>`<div class="list-row"><div><strong>${money(p.amount  0)}</strong><div class="small muted">${esc(p.note  '')}</div></div><div class="small muted">${p.created_at ? new Date(p.created_at).toLocaleDateString('kk-KZ') : '-'}</div></div>`).join('') : '<div class="empty">Төлем тарихы жоқ</div>'}</div>
          </div>
        </div>`;
    }

    function renderWhatsApp(){
      const debtors = state.students.filter(s => Number(s.debt_amount || 0) > 0);
      $('content').innerHTML = `
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">WhatsApp</h3>
            <select id="waStudent"><option value="">Оқушы таңда</option>${state.students.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('')}</select>
            <textarea id="waText">Сәлеметсіз бе! Балаңыз бойынша хабарлама.</textarea>
            <button onclick="openWhatsApp()">Ашу</button>
            <div class="small muted" style="margin-top:8px">Толық авто жіберу үшін серверлік WhatsApp API керек. Қазір wa.me арқылы ашылады.</div>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Қарызы бар оқушылар</h3>
            ${debtors.length ? debtors.map(s=>`<div class="list-row"><div>${esc(s.name)}</div><div>${money(s.debt_amount)}</div></div>`).join('') : '<div class="empty">Қарызы бар оқушы жоқ</div>'}
          </div>
        </div>`;
    }

    function openWhatsApp(){
      const id = $('waStudent').value;
      const s = state.students.find(x => x.id === id);
      if(!s || !s.parent_phone) return notice('Оқушы немесе нөмір таңдалмаған', 'err');
      const phone = String(s.parent_phone).replace(/[^\d]/g,'');
      const text = encodeURIComponent($('waText').value.trim());
      window.open(`https://wa.me/${phone}?text=${text}`, '_blank');
    }

    function renderKaspi(){
      const saved = localStorage.getItem(cacheKey('kaspi_link')) || '';
      $('content').innerHTML = `
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Kaspi сілтеме</h3>
            <input id="kaspiLink" placeholder="Kaspi төлем сілтемесі" value="${esc(saved)}">
            <button onclick="saveKaspiLink()">Сақтау</button>
            <div class="small muted" style="margin-top:8px">Webhook қосылса кейін төлемді автомат таниды. Қазір сілтеме сақтау бар.</div>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Қолдану</h3>
            <div class="muted">Kaspi сілтемесін ата-анаға WhatsApp арқылы жібер. Кейін backend webhook қоссаң толық автомат болады.</div>
          </div>
        </div>`;
    }

    function saveKaspiLink(){
      localStorage.setItem(cacheKey('kaspi_link'), $('kaspiLink').value.trim());
      notice('Kaspi сілтемесі сақталды');
    }

    async function generateMonthlyDebt(){
      for(const s of state.students){
        const nextDebt = Number(s.debt_amount  0) + Number(s.monthly_fee  state.monthlyFeeDefault || 0);
        await sb.from('students').update({ debt_amount: nextDebt }).eq('id', s.id);
      }
      await loadMainData();
      await addNotification('Айлық қарыз автомат қосылды', 'debt');
      notice('Айлық қарыз қосылды');
    }

    function renderReports(){
      const month = ym();
      const monthlyPayments = state.payments.filter(p => ym(p.created_at || today()) === month).reduce((s,p)=>s+Number(p.amount||0),0);
      const monthlyIncome = state.cashbox.filter(c => c.type === 'Кіріс' && ym(c.created_at || today()) === month).reduce((s,c)=>s+Number(c.amount||0),0);
      const monthlyExpense = state.cashbox.filter(c => c.type === 'Шығыс' && ym(c.created_at || today()) === month).reduce((s,c)=>s+Number(c.amount||0),0);
      const debt = state.students.reduce((s,x)=>s+Number(x.debt_amount||0),0);
      const text = Айлық есеп\nАй: ${month}\nОқушы саны: ${state.students.length}\nТөлем: ${money(monthlyPayments)}\nКіріс: ${money(monthlyIncome)}\nШығыс: ${money(monthlyExpense)}\nҚалдық: ${money(monthlyIncome - monthlyExpense)}\nЖалпы қарыз: ${money(debt)};
      $('content').innerHTML = `
        <div class="grid g2">
          <div class="card">
            <h3 style="margin-top:0">Айлық есеп</h3>
            <div class="row">
              <span class="badge">Ай: ${month}</span>
              <span class="badge">Оқушы: ${state.students.length}</span>
              <span class="badge">Төлем: ${money(monthlyPayments)}</span>
              <span class="badge">Кіріс: ${money(monthlyIncome)}</span>
              <span class="badge">Шығыс: ${money(monthlyExpense)}</span>
              <span class="badge">Қалдық: ${money(monthlyIncome - monthlyExpense)}</span>
              <span class="badge">Қарыз: ${money(debt)}</span>
            </div>
          </div>
          <div class="card">
            <h3 style="margin-top:0">Есеп</h3>
            <textarea id="reportText">${esc(text)}</textarea>
            <div class="row">
              <button onclick="copyReport()">Көшіру</button>
              <button onclick="generateMonthlyDebt()">Айлық қарыз қосу</button>
            </div>
          </div>
        </div>`;
    }

    function copyReport(){
      navigator.clipboard.writeText($('reportText').value)
        .then(() => notice('Есеп көшірілді'))
        .catch(() => notice('Көшіру болмады', 'err'));
    }

    async function boot(){
      const { data } = await sb.auth.getSession();
      if(data.session?.user){
        state.user = data.session.user;
        openShell();
        renderDashboardSkeleton();
        await bootUser();
        view('dashboard');
        return;
      }
      renderAuth();
    }

    window.loginUser = loginUser;
    window.registerDirector = registerDirector;
    window.registerTeacher = registerTeacher;
    window.logout = logout;
    window.view = view;
    window.addStudent = addStudent;
    window.addPayment = addPayment;
    window.addAttendance = addAttendance;
    window.addCashbox = addCashbox;
    window.addBranch = addBranch;
    window.parentLogin = parentLogin;
    window.parentLogout = parentLogout;
    window.openWhatsApp = openWhatsApp;
    window.saveKaspiLink = saveKaspiLink;
    window.generateMonthlyDebt = generateMonthlyDebt;
    window.copyReport = copyReport;

    boot();
  </script>
</body>
</html>
